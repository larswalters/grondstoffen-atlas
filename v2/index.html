<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grondstoffen Atlas v2 — de nieuwe wereldbol</title>
<link rel="stylesheet" href="style.css?v=070" />

<!-- ==========================================================================
     v2 draait op Three.js r185 met ES-modules (geen bundler, geen build-stap).
     De importmap vertelt de browser waar "three" vandaan komt; daardoor kunnen
     onze eigen modules gewoon `import * as THREE from "three"` schrijven.
     Let op: sinds r150 levert Three GEEN three.min.js meer — ESM is de enige weg.
     ========================================================================== -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.1/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="app">
  <div id="canvasWrap"></div>

  <div id="hud">
    <!-- Kop blijft altijd staan; de ▾-knop vouwt de rest weg zodat op een
         telefoon de bol zichtbaar is en de knoppen niet buiten beeld vallen. -->
    <div id="hudKop">
      <div>
        <div class="hudTitle">Atlas v2 · fundament</div>
        <div class="hudSub">M27 — schone bol · AIS-waternet in opbouw</div>
      </div>
      <button id="hudToggle" aria-label="Menu in-/uitklappen" title="Menu in-/uitklappen">▾</button>
    </div>

    <div id="hudBody">

    <!-- Twee ONAFHANKELIJKE lagen, niet één of-of-keuze: de ondergrond is het
         oppervlak van de bol, de kustlijn ligt er als vectorlaag bovenop. -->
    <div class="hudLabel">Ondergrond</div>
    <div class="btnRow">
      <button class="bmBtn is-on" data-bm="satelliet">satelliet</button>
      <button class="bmBtn" data-bm="kaart">kaart</button>
      <button class="bmBtn" data-bm="egaal">egaal</button>
    </div>

    <div class="hudLabel">Kustlijn (vector)</div>
    <div class="btnRow">
      <button class="clBtn is-on" data-cl="aan">aan</button>
      <button class="clBtn" data-cl="uit">uit</button>
    </div>

    <!-- ⚠️ AIS-OMBOUW (2026-07-24): het waternet (marnet zee + binnenvaart) is
         hier bewust WEG — het wordt opnieuw opgebouwd uit World Bank
         AIS-density (corridor-first, brief = ankers, AIS = geul). De oude
         stand mét waternet, route-test, keten-router en stromen staat op
         git-tag `pre-ais-net` (?v=082). -->

    <!-- Landnet (M25): het spoor als vierde net, in een eigen bestand met eigen
         knoop-ids. Nog niet gekoppeld aan de router — eerst neerleggen, dan
         verbinden via aangewezen knooppunten. -->
    <div class="hudLabel">Landnet (spoor)</div>
    <div class="btnRow">
      <button class="lnBtn is-on" data-ln="aan">aan</button>
      <button class="lnBtn" data-ln="uit">uit</button>
    </div>
    <div id="havenLegenda" style="margin-bottom:6px">
      <span><i style="background:#5fe8c8"></i>normaalspoor (1435)</span>
      <span><i style="background:#ffb877"></i>breedspoor (1520)</span>
      <span><i style="background:#c9a6ff"></i>smalspoor</span>
      <span><i style="background:#a6f0ff"></i>hogesnelheid</span>
    </div>
    <div id="landNoot"></div>

    <!-- Havens (LAR-518): bijna 4.000 searoute-havens als losse laag. Ze zijn
         het onderwerp van de overslag — een haven is de plek waar zee,
         binnenwater en straks spoor/weg samenkomen, dus moet je ze kunnen zien
         vóór je aanwijst welke een overslaghaven wordt. -->
    <div class="hudLabel">Havens</div>
    <div class="btnRow">
      <button class="hvBtn is-on" data-hv="aan">aan</button>
      <button class="hvBtn" data-hv="uit">uit</button>
    </div>
    <!-- De kleur zegt welke netten de haven raakt. Mintgroen = kandidaat voor
         de aangewezen overslaghavens; de lijst zelf wijst Lars aan. -->
    <div id="havenLegenda">
      <span><i style="background:#ff6ad5"></i>zee + rivier + spoor (WPI)</span>
      <span><i style="background:#4fe3b0"></i>zee + rivier</span>
      <span><i style="background:#fff4e2"></i>alleen zee</span>
      <span><i style="background:#d9a441"></i>alleen rivier</span>
      <span><i style="background:#6a7484"></i>aan water, geen net &lt; 25 km</span>
    </div>
    <div id="havenNoot"></div>

    <!-- Route-test, keten-router en stromen (M26.x) zijn met het waternet mee
         geparkeerd op tag `pre-ais-net` — ze komen terug op het AIS-net. -->

    <!-- A/B-schakelaar: hiermee kun je het verschil dat we bespraken zelf zien -->
    <div class="hudLabel">Beeldverwerking</div>
    <div class="btnRow">
      <button class="tmBtn" data-tm="legacy">r128-stijl</button>
      <button class="tmBtn is-on" data-tm="modern">r185 · ACES</button>
    </div>

    <div class="hudLabel">Belichting</div>
    <div class="btnRow">
      <button class="sunBtn is-on" data-sun="live">zon aan</button>
      <button class="sunBtn" data-sun="flat">vlak licht</button>
    </div>

    <div id="stats"></div>

    </div><!-- /#hudBody -->
  </div>

  <!-- Zweeft mee met de cursor zodra die een haven raakt. Zonder naam is een
       stip op de kaart niet te controleren — en controleren is precies wat er
       met deze laag moet gebeuren. -->
  <div id="havenLabel" hidden></div>

  <!-- Bronvermelding is verplicht bij Esri World Imagery en OpenStreetMap. -->
  <div id="attrib"></div>

  <div id="zoomControls">
    <button id="zoomIn" aria-label="Inzoomen">+</button>
    <button id="zoomOut" aria-label="Uitzoomen">−</button>
  </div>
</div>

<script type="module" src="src/main.js?v=083"></script>
</body>
</html>
